AWSTemplateFormatVersion: '2010-09-09'
Description: Secure serverless asset proxy skeleton for the Zota task

# First deployment:
# - leave ImageUri empty
# - create the shared base resources (ECR, S3, IAM)
# Second deployment:
# - pass an immutable image URI
# - create the Lambda function, log group, Function URL, and CloudFront resources

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    MinLength: 2
    MaxLength: 10
    AllowedPattern: '^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$'
    ConstraintDescription: Must start and end with a lowercase letter or number and may contain hyphens in the middle
    Description: Lowercase environment name used in resource names

  ImageUri:
    Type: String
    Default: ''
    AllowedPattern: '^$|^.+@sha256:[A-Fa-f0-9]{64}$'
    ConstraintDescription: Must be empty for the first deployment or use an immutable image reference with an @sha256 digest
    Description: Immutable container image URI for the Lambda function

Conditions:
  HasImageUri: !Not
    - !Equals
      - !Ref ImageUri
      - ''

Resources:
  ProxyImageRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub 'zota-${EnvironmentName}-proxy'
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaImageRetrieval
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - ecr:BatchGetImage
              - ecr:GetDownloadUrlForLayer
            Condition:
              StringLike:
                aws:sourceArn: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:zota-${EnvironmentName}-proxy'
      Tags:
        - Key: Project
          Value: zota
        - Key: Environment
          Value: !Ref EnvironmentName

  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'zota-${EnvironmentName}-assets-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: zota
        - Key: Environment
          Value: !Ref EnvironmentName

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt AssetsBucket.Arn
              - !Sub '${AssetsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadAssetsBucket
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadPrivateAssets
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${AssetsBucket.Arn}/*'
        - PolicyName: WriteFunctionLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteProxyLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/zota-${EnvironmentName}-proxy:*'
      Tags:
        - Key: Project
          Value: zota
        - Key: Environment
          Value: !Ref EnvironmentName

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasImageUri
    Properties:
      LogGroupName: !Sub '/aws/lambda/zota-${EnvironmentName}-proxy'
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: zota
        - Key: Environment
          Value: !Ref EnvironmentName

  ProxyFunction:
    Type: AWS::Lambda::Function
    Condition: HasImageUri
    DependsOn:
      - LambdaLogGroup
    Properties:
      FunctionName: !Sub 'zota-${EnvironmentName}-proxy'
      PackageType: Image
      Role: !GetAtt LambdaExecutionRole.Arn
      Architectures:
        - arm64
      Code:
        ImageUri: !Ref ImageUri
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetsBucket
      Tags:
        - Key: Project
          Value: zota
        - Key: Environment
          Value: !Ref EnvironmentName

  FunctionUrl:
    Type: AWS::Lambda::Url
    Condition: HasImageUri
    Properties:
      TargetFunctionArn: !GetAtt ProxyFunction.Arn
      AuthType: AWS_IAM
      InvokeMode: BUFFERED

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: HasImageUri
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'zota-${EnvironmentName}-lambda-url-oac'
        Description: !Sub 'OAC for zota-${EnvironmentName} Lambda Function URL'
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasImageUri
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'zota-${EnvironmentName} secure asset proxy'
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: LambdaFunctionUrlOrigin
            DomainName: !Select
              - 2
              - !Split
                - /
                - !GetAtt FunctionUrl.FunctionUrl
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # AWS Managed - CachingOptimized
          Compress: true
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AWS Managed - AllViewerExceptHostHeader
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03 # AWS Managed - SecurityHeadersPolicy
          TargetOriginId: LambdaFunctionUrlOrigin
          ViewerProtocolPolicy: redirect-to-https
        Restrictions:
          GeoRestriction:
            RestrictionType: none
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  InvokeFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Condition: HasImageUri
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ProxyFunction
      FunctionUrlAuthType: AWS_IAM
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  InvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Condition: HasImageUri
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProxyFunction
      InvokedViaFunctionUrl: true
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  EcrRepositoryUri:
    Description: ECR repository URI used by the CI build job
    Value: !GetAtt ProxyImageRepository.RepositoryUri

  BucketName:
    Description: Private S3 bucket used to store the assets
    Value: !Ref AssetsBucket

  CloudFrontDistributionId:
    Condition: HasImageUri
    Description: CloudFront distribution identifier
    Value: !Ref CloudFrontDistribution

  CloudFrontUrl:
    Condition: HasImageUri
    Description: Public URL served through CloudFront
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
